# $schema: ../../Schemas/projects-model.schema.json
model: ProjectsModel
template: Projects.cshtml
title: "Projects"
description: "All the projects + libraries below are open source"

projects:
  - name: "Stream Subscription"
    description: "A library for managing IceCast stream subscriptions, enabling reactive data flow patterns for real-time event processing."
    github_url: "https://github.com/amir734jj/stream-subscription"
    website_url: "https://stream.hesamian.com"
    image: "./images/stream.png"

  - name: "Encrypted File Server"
    description: "A secure file server with built-in encryption for safe file storage and sharing."
    github_url: "https://github.com/amir734jj/encrypted-file-server"
    website_url: "https://fs.coolify.hesamian.com"
    image: "./images/fs.png"

  - name: "GeoCast"
    description: "A location-based broadcasting application that enables geo-targeted messaging and content delivery."
    github_url: "https://github.com/amir734jj/geo-cast"
    website_url: "https://geo-cast.coolify.hesamian.com"
    image: "./images/geo-cast.png"

  - name: "Nomad"
    description: "A travel and exploration platform for discovering and sharing places and experiences for your 1-day trips."
    github_url: "https://github.com/amir734jj/nomad"
    website_url: "https://nomad.coolify.hesamian.com"
    image: "./images/nomad.png"

  - name: "Symmetric Crypto Chat Room"
    description: "A real-time chat application using symmetric key cryptography for encrypted communication."
    github_url: "https://github.com/amir734jj/symmetric-crypto-chat-room"
    website_url: "https://chat.hesamian.com"
    image: "./images/chat.png"

  - name: "Amir Website"
    description: "A .NET static site generation tool powered by Razor templates, Markdown, and YAML - the engine behind this website."
    github_url: "https://github.com/amir734jj/amir-website"
    website_url: "https://amir.hesamian.com"
    image: "./images/blog.png"

  - name: "Kiosk"
    description: "Simple read only kiosk website to be displayed on a TV in an office building."
    github_url: "https://github.com/amir734jj/kiosk"
    website_url: "https://kiosk.hesamian.com"
    image: "./images/kiosk.png"

libraries:
  - name: "MIPS Simulator"
    description: "A MIPS architecture simulator written in .NET for executing MIPS assembly programs."
    github_url: "https://github.com/amir734jj/mips-simulator"

  - name: "EF Core Repository"
    description: "A generic repository pattern implementation for Entity Framework Core."
    github_url: "https://github.com/amir734jj/ef-core-repository"

  - name: "Stream Ripper"
    description: "A tool for capturing and saving IceCast audio streams."
    github_url: "https://github.com/amir734jj/Stream-ripper"

  - name: "Voice Transfer"
    description: "A covert data-over-audio tool that uses FSK modulation and the Goertzel algorithm to send files and text as audio tones disguised as phone line noise."
    github_url: "https://github.com/amir734jj/voice-transfer"

  - name: "Shoutcast Directory Crawler"
    description: "A crawler for discovering and indexing Shoutcast radio station directories."
    github_url: "https://github.com/amir734jj/shoutcast-directory-crawler"

  - name: "Custom Malloc"
    description: "A custom experimental memory allocation library for C."
    github_url: "https://github.com/amir734jj/custom-malloc"
