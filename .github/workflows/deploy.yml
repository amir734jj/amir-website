name: Validate

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: RazorBlogGenerator

      - name: Build
        run: dotnet build --no-restore
        working-directory: RazorBlogGenerator

      - name: Generate schemas
        run: dotnet run -- schema
        working-directory: RazorBlogGenerator

      - name: Validate YAML
        run: dotnet run -- validate
        working-directory: RazorBlogGenerator
