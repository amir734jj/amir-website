name: Deploy to Heroku

on:
  push:
    branches: [master]

env:
  HEROKU_APP_NAME: "amir-website"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: RazorBlogGenerator

      - name: Build
        run: dotnet build --no-restore
        working-directory: RazorBlogGenerator

      - name: Generate schemas
        run: dotnet run -- schema
        working-directory: RazorBlogGenerator

      - name: Validate YAML
        run: dotnet run -- validate
        working-directory: RazorBlogGenerator

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl -fsSL https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        run: heroku container:login

      - name: Build & Push image
        run: heroku container:push web --app ${{ env.HEROKU_APP_NAME }}

      - name: Release container
        run: heroku container:release web --app ${{ env.HEROKU_APP_NAME }}
